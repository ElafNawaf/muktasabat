services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: muktasbat
      POSTGRES_USER: muktasbat
      POSTGRES_PASSWORD: ${DB_PASSWORD:-muktasbat_secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U muktasbat"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://muktasbat:${DB_PASSWORD:-muktasbat_secret}@db:5432/muktasbat
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      FLASK_ENV: production
      BABEL_DEFAULT_LOCALE: ar
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
