services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: muktasbat
      POSTGRES_USER: muktasbat
      POSTGRES_PASSWORD: ${DB_PASSWORD:-muktasbat_secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U muktasbat"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    command: ["uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://muktasbat:${DB_PASSWORD:-muktasbat_secret}@db:5432/muktasbat
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
    depends_on:
      db:
        condition: service_healthy

  web:
    build: ./web
    ports:
      # Default 3001 avoids clashing with local `npm run dev` on 3000. Use WEB_PORT=3000 when host 3000 is free.
      - "${WEB_PORT:-3001}:3000"
    environment:
      # Server-side calls go to FastAPI inside the docker network
      API_URL: http://api:8000
      NODE_ENV: production
    depends_on:
      api:
        condition: service_started

volumes:
  pgdata:
