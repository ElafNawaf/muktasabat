{% if current_user.is_admin %}
<div class="modal fade" id="employeeCreateModal" tabindex="-1" aria-labelledby="employeeCreateModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="employeeCreateModalLabel">{{ _('Add Employee') }}</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="{{ _('Close') }}"></button>
            </div>
            <form method="POST" action="{{ url_for('employees.create') }}">
                <div class="modal-body">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label for="create_emp_name" class="form-label">{{ _('Full Name') }} *</label>
                            <input type="text" class="form-control" id="create_emp_name" name="name" required>
                        </div>
                        <div class="col-md-6">
                            <label for="create_emp_name_en" class="form-label">{{ _('Name in English') }}</label>
                            <input type="text" class="form-control" id="create_emp_name_en" name="name_en" placeholder="{{ _('Optional') }}">
                        </div>
                        <div class="col-md-6">
                            <label for="create_emp_name_ar" class="form-label">{{ _('Name in Arabic') }}</label>
                            <input type="text" class="form-control" id="create_emp_name_ar" name="name_ar" placeholder="{{ _('Optional') }}" dir="rtl">
                        </div>
                        <div class="col-md-6">
                            <label for="create_emp_user" class="form-label">{{ _('User Account') }} *</label>
                            {% if users %}
                            <select class="form-select" id="create_emp_user" name="user_id" required>
                                <option value="">{{ _('Select User') }}</option>
                                {% for user in users %}
                                <option value="{{ user.id }}">{{ user.username }} ({{ user.email }})</option>
                                {% endfor %}
                            </select>
                            {% else %}
                            <p class="form-hint mb-0">{{ _('No user accounts available to link. Register a user first.') }}</p>
                            {% endif %}
                        </div>
                        <div class="col-md-6">
                            <label for="create_emp_phone" class="form-label">{{ _('Phone') }}</label>
                            <input type="text" class="form-control" id="create_emp_phone" name="phone">
                        </div>
                        <div class="col-12">
                            <label class="form-label">{{ _('Assigned Owners') }}</label>
                            {% if owners %}
                            <div class="row g-2 assigned-owners-grid">
                                {% for owner in owners %}
                                <div class="col-md-4 col-sm-6">
                                    <div class="form-check form-check--card">
                                        <input class="form-check-input" type="checkbox" name="owner_ids" value="{{ owner.id }}" id="create_emp_owner_{{ owner.id }}">
                                        <label class="form-check-label" for="create_emp_owner_{{ owner.id }}">{{ owner|localized('name') }}</label>
                                    </div>
                                </div>
                                {% endfor %}
                            </div>
                            {% else %}
                            <p class="form-hint mb-0">{{ _('No owners to assign') }}</p>
                            {% endif %}
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">{{ _('Cancel') }}</button>
                    <button type="submit" class="btn btn-primary" {% if not users %}disabled{% endif %}>{{ _('Save') }}</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endif %}
