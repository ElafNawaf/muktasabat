<div class="modal fade" id="tenantEditModal" tabindex="-1" aria-labelledby="tenantEditModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="tenantEditModalLabel">{{ _('Edit Tenant') }}</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="{{ _('Close') }}"></button>
            </div>
            <form method="POST" action="{{ url_for('tenants.edit', tenant_id=tenant.id) }}">
                <div class="modal-body">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">{{ _('Name') }} *</label>
                            <input type="text" class="form-control" name="name" value="{{ tenant.name }}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">{{ _('Name in English') }}</label>
                            <input type="text" class="form-control" name="name_en" value="{{ tenant.name_en or '' }}" placeholder="{{ _('Optional') }}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">{{ _('Name in Arabic') }}</label>
                            <input type="text" class="form-control" name="name_ar" value="{{ tenant.name_ar or '' }}" placeholder="{{ _('Optional') }}" dir="rtl">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">{{ _('Phone') }} *</label>
                            <input type="text" class="form-control" name="phone" value="{{ tenant.phone }}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">{{ _('National ID') }} *</label>
                            <input type="text" class="form-control" name="national_id" value="{{ tenant.national_id }}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">{{ _('Email') }}</label>
                            <input type="email" class="form-control" name="email" value="{{ tenant.email or '' }}">
                        </div>
                        <div class="col-12">
                            <label class="form-label">{{ _('Notes') }}</label>
                            <textarea class="form-control" name="notes" rows="3">{{ tenant.notes or '' }}</textarea>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">{{ _('Cancel') }}</button>
                    <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> {{ _('Save') }}</button>
                </div>
            </form>
        </div>
    </div>
</div>
