{# New contract — Bootstrap modal; POST to contracts.create #}
<div class="modal fade" id="contractCreateModal" tabindex="-1" aria-labelledby="contractCreateModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="contractCreateModalLabel">{{ _('New Contract') }}</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="{{ _('Close') }}"></button>
            </div>
            <form method="POST" action="{{ url_for('contracts.create') }}" id="contractCreateForm">
                <div class="modal-body">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label for="create_unit_id" class="form-label">{{ _('Unit') }} *</label>
                            <select class="form-select" id="create_unit_id" name="unit_id" required>
                                <option value="">{{ _('Select Unit') }}</option>
                                {% for unit in units %}
                                <option value="{{ unit.id }}" {% if request.args.get('unit_id') and request.args.get('unit_id')|int == unit.id %}selected{% endif %}>
                                    {{ unit.number }} — {{ unit.building|localized('name') }} ({{ unit.building.owner|localized('name') }})
                                </option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label for="create_tenant_id" class="form-label">{{ _('Tenant') }} *</label>
                            <select class="form-select" id="create_tenant_id" name="tenant_id" required>
                                <option value="">{{ _('Select Tenant') }}</option>
                                {% for tenant in tenants %}
                                <option value="{{ tenant.id }}">{{ tenant|localized('name') }} ({{ tenant.national_id }})</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label for="create_contract_number" class="form-label">{{ _('Contract Number') }} *</label>
                            <input type="text" class="form-control" id="create_contract_number" name="contract_number" required autocomplete="off">
                        </div>
                        <div class="col-md-4">
                            <label for="create_start_date" class="form-label">{{ _('Start Date') }} *</label>
                            <input type="date" class="form-control" id="create_start_date" name="start_date" required>
                        </div>
                        <div class="col-md-4">
                            <label for="create_end_date" class="form-label">{{ _('End Date') }} *</label>
                            <input type="date" class="form-control" id="create_end_date" name="end_date" required>
                        </div>
                        <div class="col-md-6">
                            <label for="create_rent_amount" class="form-label">{{ _('Monthly Rent (SAR)') }} *</label>
                            <input type="number" step="0.01" min="0" class="form-control" id="create_rent_amount" name="rent_amount" required>
                        </div>
                        <div class="col-md-6">
                            <label for="create_payment_cycle" class="form-label">{{ _('Payment Cycle') }} *</label>
                            <select class="form-select" id="create_payment_cycle" name="payment_cycle" required>
                                <option value="3">{{ _('Every 3 months') }}</option>
                                <option value="6">{{ _('Every 6 months') }}</option>
                                <option value="12">{{ _('Yearly') }}</option>
                            </select>
                        </div>
                        <div class="col-12">
                            <label for="create_notes" class="form-label">{{ _('Notes') }}</label>
                            <textarea class="form-control" id="create_notes" name="notes" rows="3"></textarea>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">{{ _('Cancel') }}</button>
                    <button type="submit" class="btn btn-primary">{{ _('Save') }}</button>
                </div>
            </form>
        </div>
    </div>
</div>
