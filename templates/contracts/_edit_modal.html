<div class="modal fade" id="contractEditModal" tabindex="-1" aria-labelledby="contractEditModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="contractEditModalLabel">{{ _('Edit Contract') }} — {{ contract.contract_number }}</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="{{ _('Close') }}"></button>
            </div>
            <form method="POST" action="{{ url_for('contracts.edit', contract_id=contract.id) }}">
                <div class="modal-body">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label">{{ _('Contract Number') }} *</label>
                            <input type="text" class="form-control" name="contract_number" value="{{ contract.contract_number }}" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">{{ _('Start Date') }} *</label>
                            <input type="date" class="form-control" name="start_date" value="{{ contract.start_date.isoformat() }}" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">{{ _('End Date') }} *</label>
                            <input type="date" class="form-control" name="end_date" value="{{ contract.end_date.isoformat() }}" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">{{ _('Monthly Rent (SAR)') }} *</label>
                            <input type="number" step="0.01" class="form-control" name="rent_amount" value="{{ contract.rent_amount }}" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">{{ _('Payment Cycle') }} *</label>
                            <select class="form-select" name="payment_cycle" required>
                                <option value="3" {% if contract.payment_cycle == 3 %}selected{% endif %}>{{ _('Every 3 months') }}</option>
                                <option value="6" {% if contract.payment_cycle == 6 %}selected{% endif %}>{{ _('Every 6 months') }}</option>
                                <option value="12" {% if contract.payment_cycle == 12 %}selected{% endif %}>{{ _('Yearly') }}</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">{{ _('Status') }}</label>
                            <select class="form-select" name="status">
                                <option value="active" {% if contract.status == 'active' %}selected{% endif %}>{{ _('Active') }}</option>
                                <option value="expired" {% if contract.status == 'expired' %}selected{% endif %}>{{ _('Expired') }}</option>
                                <option value="terminated" {% if contract.status == 'terminated' %}selected{% endif %}>{{ _('Terminated') }}</option>
                            </select>
                        </div>
                        <div class="col-12">
                            <label class="form-label">{{ _('Notes') }}</label>
                            <textarea class="form-control" name="notes" rows="3">{{ contract.notes or '' }}</textarea>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">{{ _('Cancel') }}</button>
                    <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> {{ _('Save') }}</button>
                </div>
            </form>
        </div>
    </div>
</div>
