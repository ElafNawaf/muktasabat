{% extends "base.html" %}
{% block title %}{{ _('Edit Contract') if contract else _('New Contract') }}{% endblock %}

{% block content %}
<div class="page-header">
    <h1>{{ _('Edit Contract') if contract else _('New Contract') }}</h1>
</div>

<div class="card">
    <div class="card-body">
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="row g-3">
                <div class="col-md-6">
                    <label for="unit_id" class="form-label">{{ _('Unit') }} *</label>
                    <select class="form-select" id="unit_id" name="unit_id" required {% if contract %}disabled{% endif %}>
                        <option value="">{{ _('Select Unit') }}</option>
                        {% for unit in units %}
                        <option value="{{ unit.id }}" {% if (contract and contract.unit_id == unit.id) or request.args.get('unit_id')|int == unit.id %}selected{% endif %}>
                            {{ unit.number }} - {{ unit.building|localized('name') }} ({{ unit.building.owner|localized('name') }})
                        </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6">
                    <label for="tenant_id" class="form-label">{{ _('Tenant') }} *</label>
                    <select class="form-select" id="tenant_id" name="tenant_id" required {% if contract %}disabled{% endif %}>
                        <option value="">{{ _('Select Tenant') }}</option>
                        {% for tenant in tenants %}
                        <option value="{{ tenant.id }}" {% if contract and contract.tenant_id == tenant.id %}selected{% endif %}>{{ tenant|localized('name') }} ({{ tenant.national_id }})</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-4">
                    <label for="contract_number" class="form-label">{{ _('Contract Number') }} *</label>
                    <input type="text" class="form-control" id="contract_number" name="contract_number" value="{{ contract.contract_number if contract else '' }}" required>
                </div>
                <div class="col-md-4">
                    <label for="start_date" class="form-label">{{ _('Start Date') }} *</label>
                    <input type="date" class="form-control" id="start_date" name="start_date" value="{{ contract.start_date.isoformat() if contract else '' }}" required>
                </div>
                <div class="col-md-4">
                    <label for="end_date" class="form-label">{{ _('End Date') }} *</label>
                    <input type="date" class="form-control" id="end_date" name="end_date" value="{{ contract.end_date.isoformat() if contract else '' }}" required>
                </div>
                <div class="col-md-6">
                    <label for="rent_amount" class="form-label">{{ _('Monthly Rent (SAR)') }} *</label>
                    <input type="number" step="0.01" class="form-control" id="rent_amount" name="rent_amount" value="{{ contract.rent_amount if contract else '' }}" required>
                </div>
                <div class="col-md-6">
                    <label for="payment_cycle" class="form-label">{{ _('Payment Cycle') }} *</label>
                    <select class="form-select" id="payment_cycle" name="payment_cycle" required>
                        <option value="3" {% if contract and contract.payment_cycle == 3 %}selected{% endif %}>{{ _('Every 3 months') }}</option>
                        <option value="6" {% if contract and contract.payment_cycle == 6 %}selected{% endif %}>{{ _('Every 6 months') }}</option>
                        <option value="12" {% if contract and contract.payment_cycle == 12 %}selected{% endif %}>{{ _('Yearly') }}</option>
                    </select>
                </div>
                {% if contract %}
                <div class="col-md-6">
                    <label for="status" class="form-label">{{ _('Status') }}</label>
                    <select class="form-select" id="status" name="status">
                        <option value="active" {% if contract.status == 'active' %}selected{% endif %}>{{ _('Active') }}</option>
                        <option value="expired" {% if contract.status == 'expired' %}selected{% endif %}>{{ _('Expired') }}</option>
                        <option value="terminated" {% if contract.status == 'terminated' %}selected{% endif %}>{{ _('Terminated') }}</option>
                    </select>
                </div>
                {% endif %}
                <div class="col-12">
                    <label for="notes" class="form-label">{{ _('Notes') }}</label>
                    <textarea class="form-control" id="notes" name="notes" rows="3">{{ contract.notes if contract else '' }}</textarea>
                </div>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">{{ _('Save') }}</button>
                <a href="{{ url_for('contracts.index') }}" class="btn btn-outline-secondary">{{ _('Cancel') }}</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
