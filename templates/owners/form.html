{% extends "base.html" %}
{% block title %}{{ _('Edit Owner') if owner else _('Add Owner') }}{% endblock %}

{% block content %}
<div class="page-header">
    <h1>{{ _('Edit Owner') if owner else _('Add Owner') }}</h1>
</div>

<div class="card">
    <div class="card-body">
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="row g-3">
                <div class="col-md-6">
                    <label for="name" class="form-label">{{ _('Name') }} *</label>
                    <input type="text" class="form-control" id="name" name="name" value="{{ owner.name if owner else '' }}" required>
                </div>
                <div class="col-md-6">
                    <label for="name_en" class="form-label">{{ _('Name in English') }}</label>
                    <input type="text" class="form-control" id="name_en" name="name_en" value="{{ owner.name_en if owner else '' }}" placeholder="{{ _('Optional') }}">
                </div>
                <div class="col-md-6">
                    <label for="name_ar" class="form-label">{{ _('Name in Arabic') }}</label>
                    <input type="text" class="form-control" id="name_ar" name="name_ar" value="{{ owner.name_ar if owner else '' }}" placeholder="{{ _('Optional') }}" dir="rtl">
                </div>
                <div class="col-md-6">
                    <label for="phone" class="form-label">{{ _('Phone') }}</label>
                    <input type="text" class="form-control" id="phone" name="phone" value="{{ owner.phone if owner else '' }}">
                </div>
                <div class="col-md-6">
                    <label for="email" class="form-label">{{ _('Email') }}</label>
                    <input type="email" class="form-control" id="email" name="email" value="{{ owner.email if owner else '' }}">
                </div>
                <div class="col-md-6">
                    <label for="national_id" class="form-label">{{ _('National ID') }}</label>
                    <input type="text" class="form-control" id="national_id" name="national_id" value="{{ owner.national_id if owner else '' }}">
                </div>
                <div class="col-md-6">
                    <label for="bank_name" class="form-label">{{ _('Bank Name') }}</label>
                    <input type="text" class="form-control" id="bank_name" name="bank_name" value="{{ owner.bank_name if owner else '' }}">
                </div>
                <div class="col-md-6">
                    <label for="iban" class="form-label">{{ _('IBAN') }}</label>
                    <input type="text" class="form-control" id="iban" name="iban" value="{{ owner.iban if owner else '' }}">
                </div>
                <div class="col-12">
                    <label for="notes" class="form-label">{{ _('Notes') }}</label>
                    <textarea class="form-control" id="notes" name="notes" rows="3">{{ owner.notes if owner else '' }}</textarea>
                </div>
                <div class="col-md-6">
                    <label for="notes_en" class="form-label">{{ _('Notes in English') }}</label>
                    <textarea class="form-control" id="notes_en" name="notes_en" rows="2" placeholder="{{ _('Optional') }}">{{ owner.notes_en if owner else '' }}</textarea>
                </div>
                <div class="col-md-6">
                    <label for="notes_ar" class="form-label">{{ _('Notes in Arabic') }}</label>
                    <textarea class="form-control" id="notes_ar" name="notes_ar" rows="2" placeholder="{{ _('Optional') }}" dir="rtl">{{ owner.notes_ar if owner else '' }}</textarea>
                </div>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">{{ _('Save') }}</button>
                <a href="{{ url_for('owners.index') }}" class="btn btn-outline-secondary">{{ _('Cancel') }}</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
