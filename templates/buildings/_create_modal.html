<div class="modal fade" id="buildingCreateModal" tabindex="-1" aria-labelledby="buildingCreateModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="buildingCreateModalLabel">{{ _('Add Building') }}</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="{{ _('Close') }}"></button>
            </div>
            <form method="POST" action="{{ url_for('buildings.create') }}">
                <div class="modal-body">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label for="create_building_owner" class="form-label">{{ _('Owner') }} *</label>
                            <select class="form-select" id="create_building_owner" name="owner_id" required>
                                <option value="">{{ _('Select Owner') }}</option>
                                {% set oid = request.args.get('owner_id') %}
                                {% for owner in owners %}
                                <option value="{{ owner.id }}" {% if oid != none and oid != '' and (oid|int == owner.id) %}selected{% endif %}>{{ owner|localized('name') }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label for="create_building_name" class="form-label">{{ _('Building Name') }} *</label>
                            <input type="text" class="form-control" id="create_building_name" name="name" required>
                        </div>
                        <div class="col-md-6">
                            <label for="create_building_name_en" class="form-label">{{ _('Name in English') }}</label>
                            <input type="text" class="form-control" id="create_building_name_en" name="name_en" placeholder="{{ _('Optional') }}">
                        </div>
                        <div class="col-md-6">
                            <label for="create_building_name_ar" class="form-label">{{ _('Name in Arabic') }}</label>
                            <input type="text" class="form-control" id="create_building_name_ar" name="name_ar" placeholder="{{ _('Optional') }}" dir="rtl">
                        </div>
                        <div class="col-12">
                            <label for="create_building_address" class="form-label">{{ _('Address') }}</label>
                            <input type="text" class="form-control" id="create_building_address" name="address">
                        </div>
                        <div class="col-md-6">
                            <label for="create_building_address_en" class="form-label">{{ _('Address in English') }}</label>
                            <input type="text" class="form-control" id="create_building_address_en" name="address_en" placeholder="{{ _('Optional') }}">
                        </div>
                        <div class="col-md-6">
                            <label for="create_building_address_ar" class="form-label">{{ _('Address in Arabic') }}</label>
                            <input type="text" class="form-control" id="create_building_address_ar" name="address_ar" placeholder="{{ _('Optional') }}" dir="rtl">
                        </div>
                        <div class="col-md-6">
                            <label for="create_building_city" class="form-label">{{ _('City') }}</label>
                            <input type="text" class="form-control" id="create_building_city" name="city">
                        </div>
                        <div class="col-md-6">
                            <label for="create_building_city_en" class="form-label">{{ _('City in English') }}</label>
                            <input type="text" class="form-control" id="create_building_city_en" name="city_en" placeholder="{{ _('Optional') }}">
                        </div>
                        <div class="col-md-6">
                            <label for="create_building_city_ar" class="form-label">{{ _('City in Arabic') }}</label>
                            <input type="text" class="form-control" id="create_building_city_ar" name="city_ar" placeholder="{{ _('Optional') }}" dir="rtl">
                        </div>
                        <div class="col-md-6">
                            <label for="create_building_district" class="form-label">{{ _('District') }}</label>
                            <input type="text" class="form-control" id="create_building_district" name="district">
                        </div>
                        <div class="col-md-6">
                            <label for="create_building_district_en" class="form-label">{{ _('District in English') }}</label>
                            <input type="text" class="form-control" id="create_building_district_en" name="district_en" placeholder="{{ _('Optional') }}">
                        </div>
                        <div class="col-md-6">
                            <label for="create_building_district_ar" class="form-label">{{ _('District in Arabic') }}</label>
                            <input type="text" class="form-control" id="create_building_district_ar" name="district_ar" placeholder="{{ _('Optional') }}" dir="rtl">
                        </div>
                        <div class="col-12">
                            <label for="create_building_notes" class="form-label">{{ _('Notes') }}</label>
                            <textarea class="form-control" id="create_building_notes" name="notes" rows="3"></textarea>
                        </div>
                        <div class="col-md-6">
                            <label for="create_building_notes_en" class="form-label">{{ _('Notes in English') }}</label>
                            <textarea class="form-control" id="create_building_notes_en" name="notes_en" rows="2" placeholder="{{ _('Optional') }}"></textarea>
                        </div>
                        <div class="col-md-6">
                            <label for="create_building_notes_ar" class="form-label">{{ _('Notes in Arabic') }}</label>
                            <textarea class="form-control" id="create_building_notes_ar" name="notes_ar" rows="2" placeholder="{{ _('Optional') }}" dir="rtl"></textarea>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">{{ _('Cancel') }}</button>
                    <button type="submit" class="btn btn-primary">{{ _('Save') }}</button>
                </div>
            </form>
        </div>
    </div>
</div>
