{% extends "base.html" %}
{% block title %}{{ _('Edit Building') if building else _('Add Building') }}{% endblock %}

{% block content %}
<div class="page-header">
    <h1>{{ _('Edit Building') if building else _('Add Building') }}</h1>
</div>

<div class="card">
    <div class="card-body">
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="owner_id" class="form-label">{{ _('Owner') }} *</label>
                    <select class="form-select" id="owner_id" name="owner_id" required>
                        <option value="">{{ _('Select Owner') }}</option>
                        {% for owner in owners %}
                        <option value="{{ owner.id }}" {% if (building and building.owner_id == owner.id) or request.args.get('owner_id')|int == owner.id %}selected{% endif %}>{{ owner|localized('name') }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="name" class="form-label">{{ _('Building Name') }} *</label>
                    <input type="text" class="form-control" id="name" name="name" value="{{ building.name if building else '' }}" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="name_en" class="form-label">{{ _('Name in English') }}</label>
                    <input type="text" class="form-control" id="name_en" name="name_en" value="{{ building.name_en if building else '' }}" placeholder="{{ _('Optional') }}">
                </div>
                <div class="col-md-6 mb-3">
                    <label for="name_ar" class="form-label">{{ _('Name in Arabic') }}</label>
                    <input type="text" class="form-control" id="name_ar" name="name_ar" value="{{ building.name_ar if building else '' }}" placeholder="{{ _('Optional') }}" dir="rtl">
                </div>
                <div class="col-md-12 mb-3">
                    <label for="address" class="form-label">{{ _('Address') }}</label>
                    <input type="text" class="form-control" id="address" name="address" value="{{ building.address if building else '' }}">
                </div>
                <div class="col-md-6 mb-3">
                    <label for="address_en" class="form-label">{{ _('Address in English') }}</label>
                    <input type="text" class="form-control" id="address_en" name="address_en" value="{{ building.address_en if building else '' }}" placeholder="{{ _('Optional') }}">
                </div>
                <div class="col-md-6 mb-3">
                    <label for="address_ar" class="form-label">{{ _('Address in Arabic') }}</label>
                    <input type="text" class="form-control" id="address_ar" name="address_ar" value="{{ building.address_ar if building else '' }}" placeholder="{{ _('Optional') }}" dir="rtl">
                </div>
                <div class="col-md-6 mb-3">
                    <label for="city" class="form-label">{{ _('City') }}</label>
                    <input type="text" class="form-control" id="city" name="city" value="{{ building.city if building else '' }}">
                </div>
                <div class="col-md-6 mb-3">
                    <label for="city_en" class="form-label">{{ _('City in English') }}</label>
                    <input type="text" class="form-control" id="city_en" name="city_en" value="{{ building.city_en if building else '' }}" placeholder="{{ _('Optional') }}">
                </div>
                <div class="col-md-6 mb-3">
                    <label for="city_ar" class="form-label">{{ _('City in Arabic') }}</label>
                    <input type="text" class="form-control" id="city_ar" name="city_ar" value="{{ building.city_ar if building else '' }}" placeholder="{{ _('Optional') }}" dir="rtl">
                </div>
                <div class="col-md-6 mb-3">
                    <label for="district" class="form-label">{{ _('District') }}</label>
                    <input type="text" class="form-control" id="district" name="district" value="{{ building.district if building else '' }}">
                </div>
                <div class="col-md-6 mb-3">
                    <label for="district_en" class="form-label">{{ _('District in English') }}</label>
                    <input type="text" class="form-control" id="district_en" name="district_en" value="{{ building.district_en if building else '' }}" placeholder="{{ _('Optional') }}">
                </div>
                <div class="col-md-6 mb-3">
                    <label for="district_ar" class="form-label">{{ _('District in Arabic') }}</label>
                    <input type="text" class="form-control" id="district_ar" name="district_ar" value="{{ building.district_ar if building else '' }}" placeholder="{{ _('Optional') }}" dir="rtl">
                </div>
                <div class="col-12 mb-3">
                    <label for="notes" class="form-label">{{ _('Notes') }}</label>
                    <textarea class="form-control" id="notes" name="notes" rows="3">{{ building.notes if building else '' }}</textarea>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="notes_en" class="form-label">{{ _('Notes in English') }}</label>
                    <textarea class="form-control" id="notes_en" name="notes_en" rows="2" placeholder="{{ _('Optional') }}">{{ building.notes_en if building else '' }}</textarea>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="notes_ar" class="form-label">{{ _('Notes in Arabic') }}</label>
                    <textarea class="form-control" id="notes_ar" name="notes_ar" rows="2" placeholder="{{ _('Optional') }}" dir="rtl">{{ building.notes_ar if building else '' }}</textarea>
                </div>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">{{ _('Save') }}</button>
                <a href="{{ url_for('buildings.index') }}" class="btn btn-outline-secondary">{{ _('Cancel') }}</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
